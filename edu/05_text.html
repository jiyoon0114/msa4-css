<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="05.css">
  <title>Document</title>
</head>
<body>
  <h1 class="h1-color h1-text-transform h1-letter-spacing">글자 색상</h1>
  <h1 class="h1-text-decoration h1-word-spacing">텍스트 데코레이션</h1>
  <p class="p-align">글자 정렬 방향</p>
  <!-- div.box 누르고 엔터 누르면 box 클라스를 가진 div를 자동으로 만들어줌 -->
  <div class="box">
    <p class="p-line-height">백그라운드 컬러</p>
  </div>
  <p class="shadow">그림자</p>
</body>
</html>
