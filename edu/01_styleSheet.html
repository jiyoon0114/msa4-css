<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- rel: 불러오는 파일의 종류, href: 불려올 파일 주소 -->
  <link rel="stylesheet" href="01.css">
  <title>01_styleSheet</title>
  <style>
    h2{
      color: blue;
    }
  </style>
</head>
<body>
  <!-- 인라인 스타일: html요소에 style 속성을 통해 직접 스타일을 적용 -->
  <h1 style="color: rgb(84, 183, 226);">안녕 CSS</h1>

  <!-- 내부 스타일: head 태그 안에 style태그를 사용하여 스타일을 적용하는 방법 -->
  <h2>내부 스타일</h2>

  <!-- 외부 스타일: 별도의 css 파일을 작성하고 head태그에 link태그를 사용해서 스타일을 적용(일반적으로 이거 사용) -->
  <h3>외부 스타일</h3>
  
</body>
</html>
